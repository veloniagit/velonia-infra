services:
  metabase:
    image: metabase/metabase:latest
    container_name: velonia_metabase
    restart: always
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: velonia
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    labels:
      - traefik.enable=true
      - traefik.http.routers.metabase.rule=Host(`dashboard.velonia.com.br`)
      - traefik.http.routers.metabase.entrypoints=websecure
      - traefik.http.routers.metabase.tls.certresolver=letsencrypt
      - traefik.http.services.metabase.loadbalancer.server.port=3000
    networks:
      - velonia_network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  velonia_network:
    external: true
