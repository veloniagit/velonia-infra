services:
  redis:
    image: redis:7-alpine
    container_name: velonia_redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - velonia_redis_data:/data
    networks:
      - velonia_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  velonia_redis_data:
    name: velonia_redis_data

networks:
  velonia_network:
    external: true
