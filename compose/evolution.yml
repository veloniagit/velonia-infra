services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: velonia_evolution_api
    restart: always
    environment:
      SERVER_TYPE: http
      SERVER_PORT: ${EVOLUTION_PORT}
      SERVER_URL: https://${EVOLUTION_DOMAIN}

      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: true

      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://${EVOLUTION_DATABASE_USER}:${EVOLUTION_DATABASE_PASSWORD}@postgres:5432/velonia?schema=evolution"
      DATABASE_URL: "postgresql://${EVOLUTION_DATABASE_USER}:${EVOLUTION_DATABASE_PASSWORD}@postgres:5432/velonia?schema=evolution"
       
      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/1
      CACHE_REDIS_PREFIX_KEY: evolution

      LOG_LEVEL: DEBUG
      TZ: ${TIMEZONE}

    volumes:
      - velonia_evolution_data:/evolution/instances

    networks:
      - velonia_network

    labels:
      - traefik.enable=true
      - traefik.http.routers.evolution.rule=Host(`${EVOLUTION_DOMAIN}`)
      - traefik.http.routers.evolution.entrypoints=websecure
      - traefik.http.routers.evolution.tls.certresolver=letsencrypt
      - traefik.http.services.evolution.loadbalancer.server.port=8080

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  velonia_evolution_data:
    name: velonia_evolution_data

networks:
  velonia_network:
    external: true
